<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu Quiniela</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background-color: #f3f0f7; /* Fondo con un toque lila muy suave */
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
    }
    .container { 
      max-width: 600px; 
      width: 100%; 
      background: #fff; 
      padding: 25px; 
      border-radius: 12px; 
      box-shadow: 0 4px 20px rgba(106, 27, 154, 0.1); 
    }
    h1 { 
      text-align: center; 
      color: #4a148c; 
      margin-bottom: 25px; 
      border-bottom: 3px solid #7b1fa2; 
      padding-bottom: 10px; 
    }
    
    /* Contenedor de cada partido - Morado Suave */
    .match-card {
      margin-bottom: 25px;
      border: 2px solid #e1bee7; /* Borde lila claro */
      border-radius: 10px;
      overflow: hidden;
      background-color: #fff;
      transition: transform 0.2s;
    }

    /* Título del partido destacado en morado */
    .match-header {
      background-color: #7b1fa2; /* Morado principal */
      padding: 12px 15px;
      border-bottom: 2px solid #4a148c;
      font-weight: bold;
      color: #ffffff; /* Texto blanco para contraste */
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .match-body { padding: 15px; }

    label { display: block; margin-bottom: 8px; font-weight: bold; color: #4a148c; }
    
    /* Bloques de probabilidad */
    .prob-box { display: flex; gap: 6px; margin-bottom: 15px; }
    .prob-item { 
      flex: 1; 
      text-align: center; 
      padding: 8px; 
      border-radius: 6px; 
      color: white; 
      font-size: 13px; 
      font-weight: bold; 
      text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
    }
    .prob-1 { background-color: #2e7d32; } /* Verde */
    .prob-x { background-color: #ffa000; color: #fff; } /* Naranja/Oro */
    .prob-2 { background-color: #d32f2f; } /* Rojo */

    /* Análisis IA con fondo lila */
    .recomendacion { 
      background-color: #f3e5f5; 
      border-left: 5px solid #7b1fa2; 
      padding: 12px; 
      margin-bottom: 15px; 
      font-size: 14px; 
      color: #4a148c;
      border-radius: 0 4px 4px 0;
    }

    select { 
      width: 100%; 
      padding: 12px; 
      border: 2px solid #ce93d8; 
      border-radius: 8px; 
      background-color: #fff; 
      font-size: 15px;
      color: #333;
    }
    select:focus { border-color: #7b1fa2; outline: none; }

    button { 
      width: 100%; 
      padding: 16px; 
      background: #6a1b9a; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      margin-top: 20px; 
      cursor: pointer; 
      font-size: 17px; 
      font-weight: bold; 
      transition: background 0.3s;
    }
    button:hover { background: #4a148c; }

    #extra-match { 
      display: none; 
      background: #fff9c4; 
      padding: 15px; 
      margin-top: 20px; 
      border-radius: 8px; 
      border: 2px solid #fbc02d; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tu Quiniela</h1>
    <form id="quinielaForm">
      <div style="margin-bottom: 25px;">
        <label>👤 Selecciona tu nombre:</label>
        <select id="nombre" name="nombre" required>
          <option value="">Cargando nombres...</option>
        </select>
      </div>

      <div id="partidos"></div>

      <div id="extra-match">
        <label id="labelP15" style="color: #827717;">Pleno al 15</label>
        <select name="p15" id="p15"></select>
      </div>

      <button type="submit">🚀 Enviar mi Pronóstico</button>
    </form>
  </div>

  <script>
    // IMPORTANTE: Sustituye esta URL por la de tu implementación de Google Apps Script
    const API_URL = "/api";
    let USUARIO_ESPECIAL = "";

    function formatPct(val) {
      if (!val || val === "-") return "0%";
      if (typeof val === 'number') return Math.round(val * 100) + "%";
      return val.toString().includes('%') ? val : val + "%";
    }

    async function inicializar() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        USUARIO_ESPECIAL = data.usuarioEspecial;

        const divP = document.getElementById("partidos");
        divP.innerHTML = "";
        
        data.partidos.slice(1, 15).forEach((p, i) => {
          const card = document.createElement("div");
          card.className = "match-card";
          card.innerHTML = `
            <div class="match-header">
              <span>PARTIDO ${i+1}</span>
              <span>⚽ ${p[1]} vs ${p[2]}</span>
            </div>
            <div class="match-body">
              <div class="prob-box">
                <div class="prob-item prob-1">1: ${formatPct(p[5])}</div>
                <div class="prob-item prob-x">X: ${formatPct(p[6])}</div>
                <div class="prob-item prob-2">2: ${formatPct(p[7])}</div>
              </div>
              <div class="recomendacion">💡 <b>Análisis IA:</b> ${p[8] || "Sin datos de análisis"}</div>
              <label>Tu pronóstico:</label>
              <select name="p${i+1}" required>
                <option value="">Elige 1, X o 2</option>
                <option value="1">1 (Victoria Local)</option>
                <option value="X">X (Empate)</option>
                <option value="2">2 (Victoria Visitante)</option>
              </select>
            </div>
          `;
          divP.appendChild(card);
        });

        const selN = document.getElementById("nombre");
        selN.innerHTML = '<option value="">Selecciona tu nombre</option>';
        data.pronosticos.slice(1).forEach(f => {
          if (f[0]) {
            const opt = document.createElement("option");
            opt.value = f[0];
            opt.textContent = (f[0] === USUARIO_ESPECIAL) ? f[0] + " ⭐" : f[0];
            selN.appendChild(opt);
          }
        });

        document.getElementById("labelP15").innerHTML = `<b>🔥 PLENO AL 15: ${data.datosPartido15.local} - ${data.datosPartido15.visitante}</b>`;
        const p15 = document.getElementById("p15");
        const scores = ["0","1","2","M"];
        p15.innerHTML = '<option value="">Selecciona marcador exacto</option>';
        scores.forEach(l => scores.forEach(v => {
          let o = document.createElement("option"); o.value = l+"-"+v; o.textContent = l+" - "+v; p15.appendChild(o);
        }));

      } catch (e) { 
        console.error(e);
        document.getElementById("nombre").innerHTML = '<option>Error al conectar con el servidor</option>';
      }
    }

    document.getElementById("nombre").addEventListener("change", function() {
      document.getElementById("extra-match").style.display = (this.value === USUARIO_ESPECIAL) ? "block" : "none";
    });

    document.getElementById("quinielaForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.innerText = "Enviando...";

      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());
      
      try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const r = await res.json();
        if(r.resultado === "ok") { 
          alert("✅ ¡Pronóstico guardado correctamente!"); 
          location.reload(); 
        }
      } catch (err) {
        alert("❌ Error al enviar. Inténtalo de nuevo.");
        btn.disabled = false;
        btn.innerText = "🚀 Enviar mi Pronóstico";
      }
    });

    inicializar();
  </script>
</body>
</html>
