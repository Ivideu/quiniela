<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu Quiniela</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 600px; width: 100%; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { text-align: center; color: #1a1a1a; margin-bottom: 25px; border-bottom: 2px solid #0077cc; padding-bottom: 10px; }
    
    /* Contenedor de cada partido */
    .match-card {
      margin-bottom: 20px;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      overflow: hidden; /* Para que el fondo del título respete el borde redondeado */
      background-color: #fff;
    }

    /* Diferenciación para no liarse (fondo alterno suave) */
    .match-card:nth-child(odd) {
      background-color: #fafbfc;
    }

    /* Título del partido destacado */
    .match-header {
      background-color: #f1f3f5;
      padding: 10px 15px;
      border-bottom: 1px solid #e1e4e8;
      font-weight: bold;
      color: #333;
      display: flex;
      justify-content: space-between;
    }

    .match-body { padding: 15px; }

    label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
    
    /* Bloques de probabilidad */
    .prob-box { display: flex; gap: 4px; margin-bottom: 12px; }
    .prob-item { flex: 1; text-align: center; padding: 6px; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; }
    .prob-1 { background-color: #28a745; }
    .prob-x { background-color: #ffc107; color: #333; }
    .prob-2 { background-color: #dc3545; }

    /* Análisis IA */
    .recomendacion { 
      background-color: #e8f4fd; 
      border-left: 4px solid #0077cc; 
      padding: 10px; 
      margin-bottom: 12px; 
      font-size: 13px; 
      color: #2c3e50;
    }

    select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 6px; background-color: #fff; font-size: 15px; }
    select:focus { border-color: #0077cc; outline: none; }

    button { width: 100%; padding: 14px; background: #0077cc; color: white; border: none; border-radius: 6px; margin-top: 20px; cursor: pointer; font-size: 16px; font-weight: bold; }
    #extra-match { display: none; background: #fff3cd; padding: 15px; margin-top: 15px; border-radius: 8px; border: 1px solid #ffeeba; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tu Quiniela</h1>
    <form id="quinielaForm">
      <div style="margin-bottom: 25px;">
        <label>👤 ¿Quién eres?</label>
        <select id="nombre" name="nombre" required>
          <option value="">Cargando nombres...</option>
        </select>
      </div>

      <div id="partidos"></div>

      <div id="extra-match">
        <label id="labelP15">Pleno al 15</label>
        <select name="p15" id="p15"></select>
      </div>

      <button type="submit">🚀 Enviar mi Pronóstico</button>
    </form>
  </div>

  <script>
    const API_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // RECUERDA CAMBIAR ESTO
    let USUARIO_ESPECIAL = "";

    function formatPct(val) {
      if (!val || val === "-") return "0%";
      if (typeof val === 'number') return Math.round(val * 100) + "%";
      return val.toString().includes('%') ? val : val + "%";
    }

    async function inicializar() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        USUARIO_ESPECIAL = data.usuarioEspecial;

        const divP = document.getElementById("partidos");
        divP.innerHTML = "";
        
        data.partidos.slice(1, 15).forEach((p, i) => {
          const card = document.createElement("div");
          card.className = "match-card";
          card.innerHTML = `
            <div class="match-header">
              <span>PARTIDO ${i+1}</span>
              <span>⚽ ${p[1]} vs ${p[2]}</span>
            </div>
            <div class="match-body">
              <div class="prob-box">
                <div class="prob-item prob-1">1: ${formatPct(p[5])}</div>
                <div class="prob-item prob-x">X: ${formatPct(p[6])}</div>
                <div class="prob-item prob-2">2: ${formatPct(p[7])}</div>
              </div>
              <div class="recomendacion">💡 <b>Análisis:</b> ${p[8] || "Sin datos"}</div>
              <label>Tu apuesta:</label>
              <select name="p${i+1}" required>
                <option value="">Elige 1, X o 2</option>
                <option value="1">1 (Victoria Local)</option>
                <option value="X">X (Empate)</option>
                <option value="2">2 (Victoria Visitante)</option>
              </select>
            </div>
          `;
          divP.appendChild(card);
        });

        // Cargar nombres y Pleno 15 (Igual que antes)
        const selN = document.getElementById("nombre");
        selN.innerHTML = '<option value="">Selecciona tu nombre</option>';
        data.pronosticos.slice(1).forEach(f => {
          if (f[0]) {
            const opt = document.createElement("option");
            opt.value = f[0];
            opt.textContent = (f[0] === USUARIO_ESPECIAL) ? f[0] + " ⭐" : f[0];
            selN.appendChild(opt);
          }
        });

        document.getElementById("labelP15").innerHTML = `<b>🔥 PLENO: ${data.datosPartido15.local} - ${data.datosPartido15.visitante}</b>`;
        const p15 = document.getElementById("p15");
        const scores = ["0","1","2","M"];
        p15.innerHTML = '<option value="">Resultado exacto</option>';
        scores.forEach(l => scores.forEach(v => {
          let o = document.createElement("option"); o.value = l+"-"+v; o.textContent = l+" - "+v; p15.appendChild(o);
        }));

      } catch (e) { console.error(e); }
    }

    document.getElementById("nombre").addEventListener("change", function() {
      document.getElementById("extra-match").style.display = (this.value === USUARIO_ESPECIAL) ? "block" : "none";
    });

    document.getElementById("quinielaForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
      const r = await res.json();
      if(r.resultado === "ok") { alert("✅ ¡Pronóstico guardado!"); location.reload(); }
    });

    inicializar();
  </script>
</body>
</html>
