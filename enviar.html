<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu Quiniela</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #e9eff5; /* Fondo azul grisáceo muy claro */
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
    }
    .container { 
      max-width: 620px; 
      width: 100%; 
      background: #fff; 
      padding: 30px; 
      border-radius: 15px; 
      box-shadow: 0 10px 25px rgba(0, 51, 102, 0.1); 
    }
    h1 { 
      text-align: center; 
      color: #003366; 
      margin-bottom: 30px; 
      border-bottom: 4px solid #0056b3; 
      padding-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* TARJETA DE PARTIDO - AZUL FUERTE */
    .match-card {
      margin-bottom: 30px;
      border: 2px solid #004085; /* Borde azul oscuro */
      border-radius: 12px;
      overflow: hidden;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    /* ENCABEZADO AZUL MARINO */
    .match-header {
      background-color: #003366; /* Azul Marino */
      padding: 12px 18px;
      border-bottom: 2px solid #001a33;
      font-weight: bold;
      color: #ffffff; 
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .match-body { padding: 20px; }

    label { display: block; margin-bottom: 8px; font-weight: bold; color: #003366; }
    
    /* BLOQUES DE PROBABILIDAD (F, G, H del Excel) */
    .prob-box { display: flex; gap: 8px; margin-bottom: 15px; }
    .prob-item { 
      flex: 1; 
      text-align: center; 
      padding: 10px; 
      border-radius: 8px; 
      color: white; 
      font-size: 14px; 
      font-weight: 900;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
    }
    .prob-1 { background-color: #218838; } /* Verde Victoria Local */
    .prob-x { background-color: #eab000; color: #000; } /* Amarillo Empate */
    .prob-2 { background-color: #c82333; } /* Rojo Victoria Visitante */

    /* ANÁLISIS IA (Columna I del Excel) */
    .recomendacion { 
      background-color: #e3f2fd; /* Azul cielo muy claro */
      border-left: 6px solid #0056b3; 
      padding: 15px; 
      margin-bottom: 18px; 
      font-size: 14px; 
      color: #003366;
      border-radius: 4px;
      line-height: 1.5;
    }

    /* SELECTOR DE APUESTA */
    select { 
      width: 100%; 
      padding: 12px; 
      border: 2px solid #b3d7ff; 
      border-radius: 8px; 
      background-color: #f8fbff; 
      font-size: 16px;
      color: #333;
      cursor: pointer;
    }
    select:focus { border-color: #0056b3; outline: none; }

    /* BOTÓN DE ENVÍO AZUL */
    button { 
      width: 100%; 
      padding: 16px; 
      background: #0056b3; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      margin-top: 25px; 
      cursor: pointer; 
      font-size: 18px; 
      font-weight: bold; 
      transition: background 0.3s, transform 0.2s;
    }
    button:hover { background: #003d80; transform: translateY(-2px); }
    button:active { transform: translateY(0); }

    /* PLENO AL 15 (Destacado en Oro/Amarillo) */
    #extra-match { 
      display: none; 
      background: #fffcf0; 
      padding: 20px; 
      margin-top: 25px; 
      border-radius: 12px; 
      border: 3px solid #ffd700; 
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tu Quiniela</h1>
    <form id="quinielaForm">
      <div style="margin-bottom: 30px;">
        <label>👤 Selecciona tu nombre:</label>
        <select id="nombre" name="nombre" required>
          <option value="">Cargando nombres...</option>
        </select>
      </div>

      <div id="partidos"></div>

      <div id="extra-match">
        <label id="labelP15" style="color: #856404; font-size: 1.1em;">Cargando Pleno...</label>
        <select name="p15" id="p15" style="border-color: #ffeeba;"></select>
      </div>

      <button type="submit">🚀 Enviar Pronóstico</button>
    </form>
  </div>

  <script>
    // RECUERDA: Coloca aquí tu URL de Google Apps Script (la que termina en /exec)
    const API_URL = "/api"; 
    let USUARIO_ESPECIAL = "";

    function formatPct(val) {
      if (!val || val === "-") return "0%";
      if (typeof val === 'number') return Math.round(val * 100) + "%";
      return val.toString().includes('%') ? val : val + "%";
    }

    async function inicializar() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        USUARIO_ESPECIAL = data.usuarioEspecial;

        const divP = document.getElementById("partidos");
        divP.innerHTML = "";
        
        // Generar partidos 1-14 utilizando los datos del Excel
        data.partidos.slice(1, 15).forEach((p, i) => {
          const card = document.createElement("div");
          card.className = "match-card";
          card.innerHTML = `
            <div class="match-header">
              <span>PARTIDO ${i+1} — ⏰ ${p[4] || 'Horario pendiente'}</span>
              <span>${p[1]} vs ${p[2]}</span>
            </div>
            <div class="match-body">
              <div class="prob-box">
                <div class="prob-item prob-1">1: ${formatPct(p[5])}</div> <div class="prob-item prob-x">X: ${formatPct(p[6])}</div> <div class="prob-item prob-2">2: ${formatPct(p[7])}</div> </div>
              <div class="recomendacion">
                <b>🔍 Análisis:</b> ${p[8] || "Sin datos de análisis"} </div>
              <label>Tu apuesta final:</label>
              <select name="p${i+1}" required>
                <option value="">-- Elige un signo --</option>
                <option value="1">1 (Victoria Local)</option>
                <option value="X">X (Empate)</option>
                <option value="2">2 (Victoria Visitante)</option>
              </select>
            </div>
          `;
          divP.appendChild(card);
        });

        // Cargar nombres de usuarios
        const selN = document.getElementById("nombre");
        selN.innerHTML = '<option value="">Elige tu nombre</option>';
        data.pronosticos.slice(1).forEach(f => {
          if (f[0]) {
            const opt = document.createElement("option");
            opt.value = f[0];
            opt.textContent = (f[0] === USUARIO_ESPECIAL) ? f[0] + " ⭐" : f[0];
            selN.appendChild(opt);
          }
        });

        // Datos del Pleno al 15
        document.getElementById("labelP15").innerHTML = `<b>🔥 PLENO AL 15: ${data.datosPartido15.local} vs ${data.datosPartido15.visitante}</b>`;
        const p15 = document.getElementById("p15");
        const scores = ["0","1","2","M"];
        p15.innerHTML = '<option value="">Resultado exacto del marcador</option>';
        scores.forEach(l => scores.forEach(v => {
          let o = document.createElement("option"); o.value = l+"-"+v; o.textContent = l+" - "+v; p15.appendChild(o);
        }));

      } catch (e) { 
        console.error("Error cargando datos:", e);
        document.getElementById("nombre").innerHTML = '<option>Error de conexión</option>';
      }
    }

    // Mostrar/Ocultar Pleno al 15 según el usuario
    document.getElementById("nombre").addEventListener("change", function() {
      const extra = document.getElementById("extra-match");
      extra.style.display = (this.value === USUARIO_ESPECIAL) ? "block" : "none";
    });

    // Enviar el formulario
    document.getElementById("quinielaForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.innerText = "Enviando pronóstico...";

      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());
      
      try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const r = await res.json();
        if(r.resultado === "ok") { 
          alert("✅ ¡Pronóstico guardado! Mucha suerte."); 
          location.reload(); 
        }
      } catch (err) {
        alert("❌ Error al enviar. Comprueba tu conexión.");
        btn.disabled = false;
        btn.innerText = "🚀 Enviar Pronóstico";
      }
    });

    inicializar();
  </script>
</body>
</html>
